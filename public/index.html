<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XINN AI</title>

  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body class="dark">

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-box">
      <div class="logo">X</div>
      <h2>XINN AI</h2>
    </div>

    <button class="new-chat">+ New Chat</button>

    <div class="menu">
      <p>Chat Terbaru</p>
      <button class="active">💬 Cara membuat website...</button>
      <button>💬 Ide bisnis digital</button>
      <button>💬 Script login</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <div class="left">
        <button id="menuBtn">☰</button>
        <div class="mini-logo">X</div>
        <b>XINN AI</b>
      </div>

      <div class="right">
        <button id="themeBtn">☾</button>
        <button id="moreBtn">⋮</button>
      </div>

      <!-- MENU TITIK 3 -->
      <div id="moreMenu" class="dropdown">
        <button>⚙ Pengaturan</button>
        <button>🕘 Riwayat</button>
        <button>❔ Bantuan</button>
        <button>🚪 Keluar</button>
      </div>
    </header>

    <!-- CHAT -->
    <div id="chatBox" class="chat">

      <div class="message user">
        <div class="bubble user-bubble">
          Cara membuat website simpel
          <small>10:30 ✓✓</small>
        </div>
      </div>

      <div class="message ai">
        <div class="avatar">X</div>
        <div class="bubble ai-bubble">
          Berikut langkah membuat website sederhana...
        </div>
      </div>

    </div>

    <!-- QUICK -->
    <div class="quick">
      <button>💡 Ide Bisnis</button>
      <button>🐛 Debug Code</button>
      <button>💻 Buat Website</button>
      <button>📈 Strategi Cuan</button>
    </div>

    <!-- INPUT -->
    <form id="chatForm" class="input-box">
      <button type="button" id="plusBtn">+</button>
      <textarea placeholder="Ketik pesan kamu..."></textarea>
      <button type="submit" class="send">↑</button>
    </form>

  </main>
</div>

<script src="./script.js"></script>
</body>
</html>
